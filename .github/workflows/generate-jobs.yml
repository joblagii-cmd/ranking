name: Generate Job Posts

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Generate all 25000 posts
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          for i in $(seq 0 499); do
            echo "--- Page $i / 499 ---"
            RESPONSE=$(curl -s -X POST https://ranking-mu-eosin.vercel.app/api/trigger \
              -H "Content-Type: application/json" \
              -d "{\"secret\": \"${CRON_SECRET}\", \"page\": $i}")
            echo $RESPONSE
            echo ""
            sleep 2
          done
          echo "Done!"
