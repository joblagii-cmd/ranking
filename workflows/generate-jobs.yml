name: Generate Job Posts

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Run batch ${{ github.run_number }}
        run: |
          curl -s -X POST https://YOUR-PROJECT.vercel.app/api/trigger \
            -H "Content-Type: application/json" \
            -d "{\"secret\": \"${{ secrets.CRON_SECRET }}\"}" | jq .
